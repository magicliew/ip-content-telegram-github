name: Generate Weekly IP Content

on:
  schedule:
    # Every Monday 9:00 Malaysia time = Monday 1:00 UTC
    - cron: "0 1 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml openai

      - name: Generate weekly content pages
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4o-mini' }}
        run: |
          python scripts/generate_weekly_content.py

      - name: Commit generated content
        run: |
          git config user.name "IP Content Bot"
          git config user.email "ip-content-bot@users.noreply.github.com"
          git add docs/
          git commit -m "Generate weekly IP content" || echo "No changes to commit"
          git push
